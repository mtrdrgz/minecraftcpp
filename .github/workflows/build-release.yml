name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-release.yml'
      - '.github/scripts/**'
      - 'mcpp/CMakeLists.txt'
      - 'mcpp/cmake/**'
      - 'mcpp/src/**'
      - 'mcpp/tools/**'
      - 'mcpp/vendor/**'

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Configure
        run: cmake -S mcpp -B build -DCMAKE_MSVC_RUNTIME_LIBRARY='MultiThreaded$<$<CONFIG:Debug>:Debug>'

      - name: Build mcpp only
        run: |
          $ErrorActionPreference = 'Continue'
          cmake --build build --config Release --target mcpp --parallel 4 *> build-output.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host '--- build-output tail ---'
            Get-Content build-output.log -Tail 220
            Write-Host '--- end build-output tail ---'
            exit $code
          }
          Get-Content build-output.log -Tail 80

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-log
          path: build-output.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Package
        run: |
          $ErrorActionPreference = 'Stop'
          $short = '${{ github.sha }}'.Substring(0, 7)
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = 'build/Release/mcpp.exe'
          if (!(Test-Path $exe)) { $exe = 'build/mcpp.exe' }
          if (!(Test-Path $exe)) { throw 'mcpp.exe was not produced' }
          Copy-Item $exe 'dist/mcpp.exe'
          (Get-FileHash 'dist/mcpp.exe' -Algorithm SHA256).Hash.ToLowerInvariant() | Set-Content -Encoding ASCII 'dist/mcpp.exe.sha256'
          Compress-Archive -Path 'dist/mcpp.exe','dist/mcpp.exe.sha256' -DestinationPath "dist/mcpp-$short-windows-x64.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: mcpp-windows-x64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 14
